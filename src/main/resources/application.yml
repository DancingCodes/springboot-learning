spring:
  profiles:
    active: local
  application:
    name: springboot-learning
  main:
    log-startup-info: false
  sql:
    init:
      mode: always
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:springbootlearning}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

logging:
  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{20} - %msg%n"
  level:
    root: warn
    com.example.springbootlearning: info

mybatis-plus:
  global-config:
    banner: false

jwt:
  secret: dancingcodes-springboot-learning-jwt-secret-key-256bit!!

server:
  port: 8080

cos:
  secret-id: ${COS_SECRET_ID:}
  secret-key: ${COS_SECRET_KEY:}
  region: ${COS_REGION:ap-beijing}
  bucket: ${COS_BUCKET:dancingcodes-1303900201}
  cdn-domain: ${COS_CDN_DOMAIN:https://cdn.moonc.love}

interest:
  annual-rate: 0.03
